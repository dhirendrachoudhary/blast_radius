[project]
name = "blast-radius"
version = "1.0.0"
description = "AI-powered blast radius analyzer: git diff → code graph traversal → auto-generated tests"
readme = "README.md"
requires-python = ">=3.10"
license = "MIT"
authors = [
    {name = "Dhirendra Choudhary", email = "dhirendrachoudhary@gmail.com"}
]
keywords = ["code-analysis", "impact-analysis", "testing", "python", "tree-sitter", "sqlite", "gemini"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Environment :: Console",
    "Intended Audience :: Developers",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Topic :: Software Development :: Testing",
]
dependencies = [
    "tree-sitter>=0.21.0",
    "tree-sitter-language-pack==0.6.0",
    "google-cloud-aiplatform",
    "python-dotenv",
    "pytest",
    "pytest-json-report",
    "typer",
]

[project.optional-dependencies]
dev = [
    "pytest",
    "pytest-json-report",
    "build",
    "twine",
]

[project.urls]
Homepage = "https://github.com/dhirendrachoudhary/blast_radius"
Repository = "https://github.com/dhirendrachoudhary/blast_radius.git"
Issues = "https://github.com/dhirendrachoudhary/blast_radius/issues"

[project.scripts]
blast-radius = "blast_radius.__main__:app"

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_functions = ["test_*"]
